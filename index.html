
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discord Message Builder</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    background:#1e1f22;
    color:white;
    font-family:sans-serif;
}

/* editor side */
#editorPanel{
    flex:1;
    padding:20px;
}

#editor{
    width:100%;
    height:100%;
    background:#2b2d31;
    border:1px solid #1e1f22;
    border-radius:6px;
    color:white;
    padding:10px;
    resize:none;
    box-sizing:border-box;
}

/* preview side */
#previewPanel{
    width:420px;
    background:#313338;
    padding:20px;
    overflow-y:auto;
}

.messageBody{
    color: #dbdee1;
}

.discordMessage{
    display:flex;
    flex-direction:column;
    gap:3px;
}

.messageHeader{
    font-size:14px;
}

.username{
    font-weight:600;
    color:#f2f3f5;
    margin-right:6px;
}

.timestamp{
    font-size:12px;
    color:#949ba4;
}

.messageBody{
    margin-top: 3px;
    font-size:15px;
    line-height:1.4;
    white-space:pre-wrap;
    word-wrap:break-word;
}

/* quote block */
.quote{
    border-left:4px solid #4e5058;
    padding-left:10px;
    margin:4px 0;
    color:#dbdee1;
}

/* inline code */
code{
    background:#1e1f22;
    padding:2px 4px;
    border-radius:4px;
    font-family:monospace;
}

/* code block */
.codeBlock{
    background:#1e1f22;
    padding:12px;
    border-radius:6px;
    font-family:monospace;
    white-space:pre;
    overflow-x:auto;
}

/* links */
a{
    color:#6995CE;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

/* embeds */
#embedContainer{
    margin-top:8px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.discordEmbed{
    display:flex;
    border-left:4px solid #5865F2;
    background:#2b2d31;
    border-radius:4px;
    padding:10px 12px;
    max-width:400px;
}

.embedContent{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.embedTitle{
    font-weight:600;
}

.embedDescription{
    color:#dbdee1;
    font-size:14px;
}

.codeLang{
  font-size:12px;
  color:#949ba4;
  margin-bottom:6px;
  font-family:monospace;
}

.spoiler{
    position: relative;
    display: inline-block;
    border-radius: 3px;
    cursor: pointer;
    padding: 0 2px;
}

.spoiler span{
    position: relative;
    z-index: 2;          /* text above overlay */
    color: transparent;      /* fully hidden no blending */
    transition: color 0.2s ease;
}

.spoiler::before{
    content: "";
    position: absolute;
    inset: 0;
    background-color: #666770;  /* hidden background */
    border-radius: 3px;
    transition: background-color 0.3s ease;
    z-index: 1;
}

.spoiler:hover::before{
    background-color: #84858D;  /* subtle hover highlight */
}

/* REVEAL: text color visible + remove overlay */
.spoiler.revealed span{
    color: inherit;  /* visible text */
}

.spoiler.revealed::before{
    display: none;   /* remove overlay to reveal text fully */
}

h1,h2,h3{
    margin:4px 0;
    font-weight:600;
}

h1{font-size:22px;}
h2{font-size:18px;}
h3{font-size:16px;}

.listItem{
        display: flex;
    align-items: flex-start;
    line-height: 0.2;   /* tighter than your global 1.4 */
    margin: 0;          /* remove any extra spacing */
    padding: 0;
}

.listItem + .listItem{
    margin-top: -1px; /* pulls items tighter together */
}

.listBullet{
    width: 16px;
    flex-shrink: 0;
    text-align: center;
    margin-right: 7px;  /* ← THIS is the spacing */
    font-size: 22px; /* 15 was default */
}

.listContent{
    flex: 1;
}
</style>
</head>

<body>

<div id="editorPanel">
<textarea id="editor" placeholder="Write your Discord message here..."></textarea>
</div>

<div id="previewPanel">
<div class="discordMessage">

<div class="messageHeader">
<span class="username">PreviewUser</span>
<span class="timestamp">Today at 12:00 PM</span>
</div>

<div id="previewMessage" class="messageBody"></div>
<div id="embedContainer"></div>

</div>
</div>

<script>

const editor = document.getElementById("editor")
const previewMessage = document.getElementById("previewMessage")
const embedContainer = document.getElementById("embedContainer")

function escapeHTML(str){
    return str
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
}

function processEmbeds(text){

    text = text.replace(
        /!youtube\((.*?)\)/g,
        function(match,url){

            const videoID = url.split("v=")[1]
            if(!videoID) return match

            return `<iframe width="100%" height="200"
                src="https://www.youtube.com/embed/${videoID}"
                frameborder="0"
                allowfullscreen>
            </iframe>`
        }
    )

    return text
}

function renderPreview(){

    let text = editor.value

    const codeBlocks = []

    text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g,function(match,lang,code){

        codeBlocks.push({
            lang: lang || "",
            code: code
        })

        return "%%CODEBLOCK%%"
    })


/* lists (-, *, indentation) */
{
    const lines = text.split("\n");
    let result = [];

    for(let i = 0; i < lines.length; i++){
        const line = lines[i];

        const match = line.match(/^(\s*)([-*])\s+(.*)/);

        if(match){
            const indentSpaces = match[1].length;
            const level = Math.floor(indentSpaces / 2); // 2 spaces per level
            const content = match[3];

            let bullet = level === 0 ? "•" : "◦";;

            result.push(
                `<div class="listItem" style="margin-left:${level * 19}px;">
                    <span class="listBullet">${bullet}</span>
                    <span class="listContent">${content}</span>
                </div>`
            );
        } else {
            result.push(line);
        }
    }

    text = result.join("\n");
}


    /* formatting rules */

/* multi-line quote (must go first) */
/* multi-line quote (>>>), line-by-line processing) */
{
    const lines = text.split("\n");
    let result = [];
    let inQuote = false;
    let quoteBuffer = [];

    for(let i = 0; i < lines.length; i++){
        const line = lines[i];

        if(line.startsWith(">>> ")){
            inQuote = true;
            quoteBuffer.push(line.slice(4)); // remove >>> 
        } else if(inQuote){
            // stop quote at a completely blank line
            if(line.trim() === ""){
                result.push('<div class="quote">' + quoteBuffer.join("\n") + '</div>');
                quoteBuffer = [];
                inQuote = false;
            } else {
                quoteBuffer.push(line);
            }
        } else {
            result.push(line);
        }
    }

    // flush any remaining quote at the end of text
    if(quoteBuffer.length > 0){
        result.push('<div class="quote">' + quoteBuffer.join("\n") + '</div>');
    }

    text = result.join("\n");
}

/* single line quote */
/* single-line quote (>), line-by-line */
{
    const lines = text.split("\n");
    for(let i = 0; i < lines.length; i++){
        if(lines[i].startsWith("> ") && !lines[i].startsWith(">>> ")){
            lines[i] = '<div class="quote">' + lines[i].slice(2) + '</div>';
        }
    }
    text = lines.join("\n");
}

/* headers */
text = text.replace(/^### (.*$)/gm,'<h3>$1</h3>')
text = text.replace(/^## (.*$)/gm,'<h2>$1</h2>')
text = text.replace(/^# (.*$)/gm,'<h1>$1</h1>')

/* spoilers */
text = text.replace(/\|\|(.*?)\|\|/g,'<span class="spoiler">$1</span>')

/* bold */
text = text.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")

/* underline */
text = text.replace(/\_\_(.*?)\_\_/g,"<u>$1</u>")

/* strikethrough */
text = text.replace(/\~\~(.*?)\~\~/g,"<s>$1</s>")

/* italic (LAST so it doesn’t break bold) */
text = text.replace(/\*(.*?)\*/g,"<i>$1</i>")

/* inline code */
text = text.replace(/\`(.*?)\`/g,"<code>$1</code>")

    text = processEmbeds(text)

/* masked links [text](url) */
text = text.replace(
    /\[([^\]]+)\]\((https?:\/\/[^\s]+)\)/g,
    '<a href="$2" target="_blank">$1</a>'
);

    /* link detection */

text = text.replace(
  /(^|[\s>])(https?:\/\/[^\s"<]+)/g,
  '$1<a href="$2" target="_blank">$2</a>'
)



    /* restore code blocks */

    let i = 0

    text = text.replace(/%%CODEBLOCK%%/g,function(){

        const block = codeBlocks[i++]

        const code = escapeHTML(block.code)

        const label = block.lang
            ? `<div class="codeLang">${block.lang}</div>`
            : ""

        return `<div class="codeBlock">
            ${label}
            <pre><code>${code}</code></pre>
        </div>`
    })

    previewMessage.innerHTML = processEmbeds(text)

    embedContainer.innerHTML = ""

    /* embed from link */

    const linkMatch = editor.value.match(/https?:\/\/[^\s]+/)

    if(linkMatch){

        const url = linkMatch[0]

        const embed = document.createElement("div")
        embed.className = "discordEmbed"

        const content = document.createElement("div")
        content.className = "embedContent"

        const title = document.createElement("div")
        title.className = "embedTitle"
        title.textContent = "Link Preview"

        const description = document.createElement("div")
        description.className = "embedDescription"
        description.textContent = url

        content.appendChild(title)
        content.appendChild(description)

        embed.appendChild(content)

        embedContainer.appendChild(embed)
    }
}

editor.addEventListener("input",renderPreview)

renderPreview()

/* spoiler */
document.addEventListener("click", e => {
    if(e.target.classList.contains("spoiler")){
        e.target.classList.toggle("revealed");
    }
});

</script>

</body>
</html>
